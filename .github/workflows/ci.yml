name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: waywork_ci
        options: >-
          --health-cmd "pg_isready -U postgres -d waywork_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/waywork_ci
      AUTH_SECRET: ci-auth-secret
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:4173
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply database schema
        run: npx prisma db push

      - name: Seed database
        run: npm run db:seed

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Mews contract tests
        run: npm run test:mews-contract

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Playwright smoke tests
        run: npm run test:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
